version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    container_name: fka-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fka-postgres
    environment:
      POSTGRES_DB: fka_vectorstore
      POSTGRES_USER: fka_user
      POSTGRES_PASSWORD: fka_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  neo4j:
    image: neo4j:5-community
    container_name: fka-neo4j
    environment:
      NEO4J_AUTH: neo4j/fka_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
volumes:
  ollama_data:
  postgres_data:
  neo4j_data:
